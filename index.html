<!DOCTYPE html>
<html>

<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1>💰 Expense Tracker</h1>
        <a href="add_expense.html" class="btn">+ Add Expense</a>
        <button id="themeToggle" class="btn">🌗 Toggle Theme</button>
        <h2>Total Spent: ₹1500</h2>

        <div class="layout">
            <!-- Cards Section -->
            <div class="cards-section">
                <h2>Expenses</h2>
                <div class="gallery">
                    <div class="card">
                        <h3>₹500</h3>
                        <p><strong>Category:</strong> 🍔 Food</p>
                        <p><strong>Description:</strong> Lunch at cafe</p>
                        <p class="date">2026-07-15</p>
                    </div>
                    <div class="card">
                        <h3>₹700</h3>
                        <p><strong>Category:</strong> 🛒 Shopping</p>
                        <p><strong>Description:</strong> Clothes</p>
                        <p class="date">2026-07-14</p>
                    </div>
                    <div class="card">
                        <h3>₹300</h3>
                        <p><strong>Category:</strong> 💄 Makeup</p>
                        <p><strong>Description:</strong> Lipstick</p>
                        <p class="date">2026-07-13</p>
                    </div>
                </div>
            </div>

            <!-- Chart Section -->
            <div class="chart-section">
                <h2>Spending Breakdown</h2>
                <canvas id="expenseChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Static data for chart -->
    <script>
        const categoryLabels = ["Food", "Shopping", "Makeup"];
        const categoryValues = [500, 700, 300];
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>

</html>
